[build-system]
requires = [
    "setuptools; python_version != '3.3'",
    "setuptools<40.0; python_version == '3.3'",
    "setuptools_scm<8.0"
]
build-backend = "setuptools.build_meta"

[project]
name = "dateutilx"
dynamic = ["version"]
description = "Modern extension to the standard Python datetime module"
readme = "README.rst"

requires-python = ">=3.10"
[project.optional-dependencies]
lint = ["pre-commit", "pylint"]
test = ["pytest", "pytest-cov"]

[tool.towncrier]
package = "dateutil"
package_dir = "dateutil"
filename = "NEWS"
directory = "changelog.d"
title_format = "Version {version} ({project_date})"
issue_format = "GH #{issue}"
template = "changelog.d/template.rst"

[[tool.towncrier.type]]
directory = "data"
name = "Data updates"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecations"
name = "Deprecations"
showcontent = true

[[tool.towncrier.type]]
directory = "feature"
name = "Features"
showcontent = true

[[tool.towncrier.type]]
directory = "bugfix"
name = "Bugfixes"
showcontent = true

[[tool.towncrier.type]]
directory = "doc"
name = "Documentation changes"
showcontent = true

[[tool.towncrier.type]]
directory = "misc"
name = "Misc"
showcontent = true

[tool.black]
target-version = ["py311", "py312", "py313", "py314"]
line-length = 120
skip-magic-trailing-comma = true

[tool.flake8]
max-line-length = 120
ignore = ["E203", "W503"]
exclude = [".git", "__pycache__", ".venv"]
per-file-ignores = ["*/__init__.py: F401"]

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
split_on_trailing_comma = false
